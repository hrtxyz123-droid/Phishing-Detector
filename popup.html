<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detector Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">

        <header>
            <img src="icons/icon128.png" alt="Logo" class="logo">
            <h1>Phishing Detector</h1>
            <div class="badge">Hybrid AI Protection</div>
        </header>

        <main>
            <div class="status-card">
                <p id="status-text">🟢 System Ready</p>

                <div class="result-display">
                    <span id="result-label">Last Scan:</span>
                    <span id="result-value">No scan yet</span>
                </div>

                <div id="progress-bar" class="progress hidden">
                    <div class="progress-fill"></div>
                </div>
            </div>

            <button id="scanEmails" class="primary-btn">
                🔍 Scan Inbox
            </button>
        </main>

        <footer>
            <p>AI + Google Safe Browsing</p>
        </footer>

    </div>

    <script src="popup.js"></script>
</body>
</html>
